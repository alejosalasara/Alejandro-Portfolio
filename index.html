<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>html,body{background:#0D0D0D;}#root{opacity:0;transition:opacity .4s ease;}</style>
  <title>Alejandro Salazar — Growth UX/UI Designer &amp; Email Marketer</title>
  <link rel="stylesheet" href="design-system/styles.css" />
  <style id="custom-overrides">
    /* ============================================================
       STICKY STACK
       After hero + the red quote band, the rest of the page is one
       section: "who am i" pins in place and the following panels —
       selected works, the marquee, let's-work, and contact — rise up
       over it as full-viewport cards and stack. Pure layout (position:
       sticky), so it's reliable in this preview where CSS transitions
       and IntersectionObserver are unreliable.
       ============================================================ */
    .stack { position: relative; }
    /* The preview harness puts overflow-x:hidden on #root, which couples to
       overflow-y:auto and turns #root into a scroll container — that breaks the
       sticky pin. Neutralise it and clip horizontal overflow at the root
       scroller instead (root-level overflow doesn't break viewport-sticky). */
    #root { overflow: visible !important; }
    html { overflow-x: hidden; scrollbar-gutter: stable; }
    .stack-card {
      position: sticky;
      top: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      /* opaque so each card fully covers the one beneath as it rises,
         but carries the same canvas + diagonal-hatch texture as the page */
      background-color: var(--canvas);
      background-image: repeating-linear-gradient(135deg, var(--hatch) 0 2px, transparent 2px 13px);
      /* anchor the weave to the VIEWPORT, not each card's own top edge, so the
         diagonal lines stay in phase across every card boundary (no seam where
         two cards meet) while still drifting for the parallax. */
      background-attachment: fixed;
      overflow: hidden;
    }
    /* explicit paint order: later cards rise over earlier ones */
    .stack-card:nth-child(1) { z-index: 1; }
    .stack-card:nth-child(2) { z-index: 2; }
    .stack-card:nth-child(3) { z-index: 3; }
    .stack-card:nth-child(4) { z-index: 4; }
    .stack-card:nth-child(5) { z-index: 5; }

    /* Each rising card carries a HAIRLINE top stroke (pure DS language — 1px
       var(--hairline), no fills) so its leading edge reads as it slides up over
       the card beneath; the continuous viewport-anchored hatch otherwise hides
       the seam. A whisper-light top-edge shadow only hints at the motion — the
       DS is "flat by intent", so the hairline does the real work, not the glow. */
    .stack-card {
      border-top: 1px solid var(--hairline);
      box-shadow: 0 -10px 26px -22px rgba(0,0,0,0.45);
    }
    [data-theme="light"] .stack-card { box-shadow: 0 -10px 24px -24px rgba(0,0,0,0.25); }
    /* the first card (who am i) has no seam above it */
    .stack-card:first-child { border-top: none; box-shadow: none; }

    /* Section ground: cards sit on the pure-black header ground (--canvas) and
       are told apart by their hairline top-stroke. The exception is SELECTED
       WORKS, which keeps the slightly-lifted grey surface (--surface-1) — a
       single quiet step up from black. Both are theme-aware (light mode uses
       the light grey / off-white). */
    .stack > .stack-card[data-nav="works"] { background-color: var(--surface-1); }

    /* the cursor hatch glow must ride ABOVE the stacked cards so it lights up
       in every section, not only the hero. The cards create stacking contexts
       at z 1–5; the fixed cursor layers default to z 0 and get buried. Lift
       them to z 6 (still under the nav at z 50). */
    .cursor-hatch, .cursor-halo, .cursor-ring { z-index: 6 !important; mix-blend-mode: screen; }

    /* nav link interactions — guarantee the hover colour + a hover underline
       (the active-link underline is driven by the scroll-spy in Nav.jsx). */
    .snav-links a:hover { color: var(--accent-red) !important; opacity: 1 !important; }
    .snav-links a:hover::after { transform: scaleX(1) !important; }

    /* the inner section components shouldn't impose their own full-height /
       big vertical padding — the card owns the vertical rhythm now */
    .stack-card > section { width: 100%; padding-top: 0; padding-bottom: 0; min-height: 0; }

    /* who am i — centered lockup, no line-art band (removed in About.jsx) */
    .about-stage { min-height: 0; padding: 0; }
    .stack-card[data-nav="about"] { overflow: visible; }
    .about-tools {
      margin-top: 48px; border-top: 1px solid var(--hairline); padding-top: 20px;
      display: flex; align-items: center; justify-content: center; gap: 10px; flex-wrap: wrap;
    }
    .about-tools-label {
      font-size: 10px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase;
      color: var(--ink-muted); margin-right: 6px; white-space: nowrap;
    }
    .about-tools-chip {
      border: 1px solid var(--hairline); padding: 5px 11px;
      font-size: 10px; font-weight: 600; letter-spacing: 2px;
      text-transform: uppercase; color: var(--ink-muted); white-space: nowrap;
    }

    /* selected works — list sits on the card; the row hairlines + label
       carry the structure (no nested filled panel) */
    .works-stage { padding: 0; }

    /* the marquee now bands the TOP of the "hit me up" (contact) section — a
       full-bleed hairline band sitting just under the nav, with the booking
       form centred in the space below it and the footer pinned to the floor. */
    .stack-card--contact > .marquee-wrap { margin-top: 78px; }
    .stack-card--contact .marquee-track .m { font-size: clamp(40px, 4.6vw, 60px); }

    /* contact + footer — its own card that SWEEPS IN HORIZONTALLY from the
       right as you scroll into it, on the SAME pure-black header ground (canvas)
       so it reads as the page's base surface sliding over the pinned card. The
       card itself is transparent + clips; the inner slab carries the surface and
       the translateX (driven by JS in the stacking script below). */
    .stack-card--contact {
      background-color: var(--canvas);
      background-image: repeating-linear-gradient(135deg, var(--hatch) 0 2px, transparent 2px 13px);
      background-attachment: fixed;
      border-top: 1px solid var(--hairline);
      justify-content: flex-start;
      padding: 0;
      overflow: hidden;
    }
    /* contact-body: two-column grid — left side stays still, right slab slides in */
    .contact-body {
      display: grid;
      grid-template-columns: 0.85fr 1.15fr;
      gap: 64px;
      align-items: start;
      max-width: 1200px;
      margin: 0 auto;
      padding: 56px 40px;
      width: 100%;
      box-sizing: border-box;
      flex: 1 1 auto;
    }
    /* c-side standing alone (mirrors .cform .c-side rules from synthesis.css) */
    .contact-body > .c-side { position: relative; }
    .contact-body > .c-side .c-eyebrow { margin-bottom: 2px; }
    .contact-body > .c-side h2 {
      margin: 0; font-family: var(--font-display); font-weight: 900; font-size: 72px;
      line-height: .9; letter-spacing: -1.5px; text-transform: uppercase; color: var(--ink);
    }
    .contact-body > .c-side p { color: var(--ink-muted); font-size: 15px; line-height: 1.55; margin: 18px 0 0; max-width: 320px; }
    .contact-body > .c-side .c-art { margin-top: 36px; opacity: .85; }
    /* form fields outside .cform (mirrors synthesis.css .cform .c-fields / .c-row2) */
    .contact-slab .c-fields { display: flex; flex-direction: column; gap: 26px; }
    .contact-slab .c-row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
    @media (max-width: 520px) { .contact-slab .c-row2 { grid-template-columns: 1fr; } }
    .contact-slab {
      min-height: 0;
      display: flex;
      flex-direction: column;
      /* base = settled & visible (so no-JS / reduced-motion shows content);
         JS pushes it to translateX(100%) off-right and slides it back to 0 */
      transform: translateX(0);
      will-change: transform;
    }
    /* footer pinned to the bottom of the contact card */
    .stack-card--contact > footer { margin-top: auto; }

    /* form items slide in from the right one-by-one once the slab is settled */
    @keyframes c-item-in {
      from { opacity: 0; transform: translateX(36px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    .contact-slab .c-fields > * { opacity: 0; }
    .contact-slab.items-in .c-fields > * {
      animation: c-item-in 0.52s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    .contact-slab.items-in .c-fields > *:nth-child(1) { animation-delay: 0.00s; }
    .contact-slab.items-in .c-fields > *:nth-child(2) { animation-delay: 0.10s; }
    .contact-slab.items-in .c-fields > *:nth-child(3) { animation-delay: 0.20s; }
    .contact-slab.items-in .c-fields > *:nth-child(4) { animation-delay: 0.30s; }
    .contact-slab.items-in .c-fields > *:nth-child(5) { animation-delay: 0.40s; }
    .contact-slab.items-in .c-fields > *:nth-child(6) { animation-delay: 0.50s; }
    @media (prefers-reduced-motion: reduce) {
      .contact-slab .c-fields > * { opacity: 1 !important; animation: none !important; }
    }

    /* "Get Started" already-on-contact pulse — inset red glow, 2 beats */
    @keyframes sal-contact-pulse {
      0%,100% { box-shadow: inset 0 0 80px 0 rgba(255,40,0,0), inset 0 0 0 0 rgba(255,40,0,0); }
      20%     { box-shadow: inset 0 0 120px 20px rgba(255,40,0,0.2), inset 0 0 0 2px rgba(255,40,0,0.6); }
      40%     { box-shadow: inset 0 0 80px 0 rgba(255,40,0,0), inset 0 0 0 0 rgba(255,40,0,0); }
      65%     { box-shadow: inset 0 0 100px 15px rgba(255,40,0,0.13), inset 0 0 0 2px rgba(255,40,0,0.38); }
      85%     { box-shadow: inset 0 0 80px 0 rgba(255,40,0,0), inset 0 0 0 0 rgba(255,40,0,0); }
    }
    .stack-card--contact.contact-pulse::after {
      content: ''; position: absolute; inset: 0 0 var(--pulse-bottom, 0px) 0; pointer-events: none; z-index: 10;
      animation: sal-contact-pulse 1.5s ease-out forwards;
    }

    /* opt-out: Tweaks "Stacking → Off" reverts to plain stacked scroll */
    .stack.no-stack > .stack-card { position: static; min-height: 0; padding-top: 90px; padding-bottom: 90px; }
    .stack.no-stack > .stack-card--contact { padding: 0; overflow: visible; }
    .stack.no-stack .contact-slab { transform: none !important; min-height: 0; border-left: none; }

    /* ============================================================
       RESPONSIVE
       The 1440 desktop layout narrows without losing its identity OR
       its mechanics. The pinned card-stack is KEPT on every width:
       each section is still a full-viewport (min-height:100vh) sticky
       card that the next one rises over. The only structural change on
       phones is overflow:visible + flex-start so a tall stacked card
       (e.g. the contact form) can grow past 100vh instead of clipping.
       ============================================================ */

    /* announce case name — inline-block so JS can measure and fix its width */
    .announce .announce-case { display: inline-block; }

    /* --- Fluid display headlines (override the hard inline px sizes) --- */
    #root .hero-inner h1 { font-size: clamp(34px, 10vw, 104px) !important; }
    .about-stage h2 { font-size: clamp(46px, 8.4vw, 92px); }

    /* --- Mobile / large-phone structural breakpoint --- */
    @media (max-width: 768px) {
      /* hide the globe wireframe entirely on mobile */
      .hero-band .hero-art { display: none !important; }

      #root .hero-inner h1 { font-size: clamp(54px, 15vw, 82px) !important; }
      /* center content horizontally */
      .hero-inner { align-items: center !important; text-align: center !important; }
      .hero-inner .hero-cta-row { justify-content: center !important; flex-direction: column !important; align-items: center !important; gap: 14px !important; }
      .hero-inner .announce { align-self: center !important; }

      /* h1 — JS scales each word's font-size to fill the container, then centers it */
      .hero-inner h1 { display: flex !important; flex-direction: column !important; align-items: stretch !important; text-align: left !important; }
      .hero-inner h1 .h-word { display: block !important; text-align: center !important; white-space: nowrap !important; }
      .hero-inner h1 br.h-br { display: none !important; }

      /* "01" on its own line above the eyebrow text */
      .hero-inner .tech-eyebrow { display: flex !important; flex-wrap: wrap !important; justify-content: center !important; gap: 3px 0 !important; text-align: center !important; }
      .hero-inner .tech-eyebrow .idx { flex: 0 0 100% !important; text-align: center !important; }
      /* center content vertically within the hero band */
      .hero-band { display: flex !important; align-items: center !important; }
      .hero-inner { padding-top: 0 !important; padding-bottom: 0 !important; }
      .container { padding: 0 22px; }
      .about-tools { gap: 6px; margin-top: 32px; }
      .about-tools-label { margin-right: 2px; }

      /* Nav: drop the centered jump-links; keep brand + CTA + language.
         CTA and language trigger are forced to ONE identical box (same height,
         same border, same vertical centering) so they read as a single aligned
         control group; they butt together via the DS -1px overlap. */
      .snav { padding: 13px 18px; gap: 12px; }
      .snav-links { display: none; }
      .snav .snav-right { margin-left: auto; display: inline-flex; align-items: center; }
      .snav .lang-menu { display: inline-flex; align-items: center; }
      .snav .snav-cta,
      .snav .lang-trigger {
        height: 40px; box-sizing: border-box; font-size: 11px;
        display: inline-flex; align-items: center; line-height: 1; margin-top: 0; margin-bottom: 0;
      }
      .snav .snav-cta { padding: 0 14px; letter-spacing: 1.5px; gap: 8px; }
      .snav .lang-trigger { padding: 0 12px; gap: 9px; }

      /* Hero — clear breathing room between the info and the red quote band */
      .hero-inner { padding-top: 96px !important; padding-bottom: 92px !important; }

      /* About — stack the lockup over the lead, left-aligned */
      .about-stage > div { grid-template-columns: 1fr !important; gap: 28px !important; }
      .about-stage h2 { text-align: left !important; }

      /* Works rows — compact so all five fit the section comfortably:
         title over meta, smaller type, tighter rows, arrow parked right */
      .works-stage .kit-label { margin-bottom: 22px !important; }
      .works-row { flex-wrap: wrap; gap: 1px 16px; padding: 12px 4px; }
      .works-row .w-title { flex: 1 1 100% !important; font-size: clamp(18px, 4.6vw, 21px) !important; }
      .works-row .w-meta { flex: 1 1 auto !important; font-size: 11.5px; }
      .works-row .w-arrow { margin-left: auto; }
      .works-row .w-arrow svg { width: 22px; height: 22px; }

      /* ---- KEEP the sticky card-stack. Each card stays a full-viewport pin;
         we only switch to top-anchored, overflow-visible so a tall card can
         extend past the viewport (no clipping) while short cards still fill it.
         Each card also gets a TOP STROKE + a soft drop shadow on its upper edge
         so it reads as a distinct sheet rising over the section beneath it. */
      .stack > .stack-card {
        overflow: visible !important;
        justify-content: flex-start;
        padding: 92px 0 60px;
        min-height: 100vh;            /* full viewport — preserved */
        border-top: 1.5px solid var(--hairline-strong, rgba(0,0,0,0.22));
        box-shadow: 0 -18px 38px -22px rgba(0,0,0,0.55);
      }
      [data-theme="light"] .stack > .stack-card {
        border-top-color: rgba(0,0,0,0.16);
        box-shadow: 0 -16px 34px -24px rgba(0,0,0,0.32);
      }
      .stack > .stack-card:first-child {
        padding-top: 104px; border-top: none; box-shadow: none;
      }
      .stack > .stack-card--marquee { gap: 44px; justify-content: center; }

      /* Selected-works card keeps its lifted grey surface (theme-aware) */
      .stack > .stack-card[data-nav="works"] { background-color: var(--surface-1); }

      /* Contact card: the horizontal sweep is disabled on mobile (it now rises
         from the bottom like the others), so let it grow normally. */
      .stack > .stack-card--contact { overflow: visible !important; padding: 0 !important; }
      .contact-body { grid-template-columns: 1fr !important; gap: 30px !important; padding: 26px 22px 0 !important; }
      .stack-card--contact > .marquee-wrap { margin-top: 70px !important; }
      .stack-card--contact .marquee-track .m { font-size: 30px !important; }
      #contact { padding-top: 0 !important; padding-bottom: 36px !important; }
      /* "hit me up" — drop the decorative bottom wireframe on narrow widths */
      .contact-body > .c-side .c-art { display: none !important; }

      /* the cursor glow is a desktop affordance — hide on touch widths */
      .cursor-hatch, .cursor-halo, .cursor-ring { display: none !important; }

      /* Footer — stack the divided bar into rows */
      .site-footer { flex-direction: column; align-items: stretch; }
      .foot-social { border-left: none !important; border-bottom: 1px solid var(--hairline); }
      .foot-cell { flex: 1 1 0; width: auto !important; padding: 18px 8px !important; }
      .foot-cell:last-child { border-right: none; }
      .foot-center { padding: 22px 16px !important; border-bottom: 1px solid var(--hairline); }
      .foot-up { width: 100%; justify-content: center; padding: 20px !important; }

      /* Quote band — FIXED height (a definite red band, never auto-collapsing) */
      .qband .qband-inner { height: 300px !important; padding-top: 30px; padding-bottom: 56px; }
      .qband .q-text { font-size: 19px; }
    }

    /* --- Small phones --- */
    @media (max-width: 460px) {
      .container { padding: 0 18px; }
      .announce { flex-wrap: wrap; gap: 10px; padding: 10px 12px; }
      .announce .txt { font-size: 12px; }
      .hero-cta-row { gap: 14px; }
      .contact-body > .c-side h2 { font-size: 52px !important; }
      .foot-cell .caption { font-size: 10px; }
      .qband .qband-inner { height: 320px !important; }
    }  </style>
  <script>
    /* set theme before first paint to avoid a flash */
    (function () {
      try {
        if (localStorage.getItem('salazar-theme') === 'light') {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      } catch (e) {}
    })();
  </script>

  <script>
    /* Swallow the benign, harness-emitted "ResizeObserver loop completed with
       undelivered notifications" notice (a no-op layout settle message — not an
       error, no effect on rendering) so it doesn't surface as a console error. */
    (function () {
      var MSG = 'ResizeObserver loop';
      window.addEventListener('error', function (e) {
        if (e && e.message && e.message.indexOf(MSG) !== -1) {
          e.stopImmediatePropagation(); e.preventDefault(); return false;
        }
      }, true);
      var origErr = window.console && window.console.error;
      if (origErr) {
        window.console.error = function () {
          var first = arguments[0];
          if (typeof first === 'string' && first.indexOf(MSG) !== -1) return;
          return origErr.apply(window.console, arguments);
        };
      }
    })();
  </script>

  <style id="preloader">
    body.preloader-active { overflow: hidden; }

    /* Hero entrance — hide elements while preloader runs, reveal with blur zoom-in */
    body.preloader-active .hero-inner > * { opacity: 0; }
    @keyframes hero-in {
      from { opacity: 0; filter: blur(14px); transform: scale(0.96); }
      to   { opacity: 1; filter: blur(0);   transform: scale(1); }
    }
    @media (prefers-reduced-motion: no-preference) {
      .hero-inner.hero-revealed > *:nth-child(1) { animation: hero-in 0.55s cubic-bezier(.2,0,.1,1) 0s both; }
      .hero-inner.hero-revealed > *:nth-child(2) { animation: hero-in 0.55s cubic-bezier(.2,0,.1,1) 0.06s both; }
      .hero-inner.hero-revealed > *:nth-child(3) { animation: hero-in 0.6s  cubic-bezier(.2,0,.1,1) 0.1s  both; }
      .hero-inner.hero-revealed > *:nth-child(4) { animation: hero-in 0.55s cubic-bezier(.2,0,.1,1) 0.16s both; }
    }
    @media (prefers-reduced-motion: reduce) {
      .hero-inner.hero-revealed > * { opacity: 1; }
    }
    @keyframes p-stage-in { from { opacity: 0; } to { opacity: 1; } }
    #preloader-stage {
      position: fixed; inset: 0; z-index: 9999; overflow: hidden;
      opacity: 1; transition: opacity .28s ease;
      animation: p-stage-in 0.55s ease forwards;
    }
    #preloader-stage.leaving { opacity: 0; pointer-events: none; }
    #preloader-stage.ready { pointer-events: none; }
    #preloader-stage.ready .p-cue { pointer-events: auto; }

    /* vertical split curtains */
    .p-curtain {
      position: absolute; top: 0; height: 100%; width: 50%; z-index: 3;
      background-color: var(--surface-1);
      background-image: repeating-linear-gradient(135deg, var(--hatch) 0 2px, transparent 2px 13px);
      transition: transform .94s cubic-bezier(.76,0,.16,1);
      overflow: hidden;
    }
    .p-curtain.l { left: 0; }
    .p-curtain.r { right: 0; }
    #preloader-stage.part .p-curtain.l { transform: translateX(-100%); }
    #preloader-stage.part .p-curtain.r { transform: translateX(100%); }

    /* number — single centered overlay, above curtains; starts hidden, JS fades it in */
    .p-numwrap {
      position: absolute; inset: 0; z-index: 4;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
      opacity: 0; transition: opacity 0.4s ease;
    }
    .p-numstack { position: relative; display: inline-block; transition: opacity .55s ease; }
    .p-num-outline, .p-num-fill {
      display: block; margin: 0;
      font-size: 19vw; font-weight: 800; line-height: 1;
      letter-spacing: -0.03em; font-family: var(--font-display);
      font-variant-numeric: tabular-nums; font-feature-settings: "tnum" 1;
    }
    .p-num-outline {
      position: relative; z-index: 1;
      color: transparent; -webkit-text-stroke: 2px var(--ink);
      -webkit-font-smoothing: antialiased;
    }
    .p-num-fill {
      position: absolute; inset: 0; z-index: 0;
      color: var(--accent-red); -webkit-text-stroke: 0;
      clip-path: inset(100% 0 0 0);
    }
    #preloader-stage.grow .p-numstack { opacity: 0; }

    /* rising red level line — sits above curtains, behind numwrap */
    .p-level {
      position: absolute; left: 0; right: 0; bottom: 0; height: 0%; z-index: 3;
      border-top: 1px solid rgba(255,40,0,0.5);
      background: linear-gradient(to top, rgba(255,40,0,0.05), transparent);
      transition: opacity .4s ease;
    }
    #preloader-stage.grow .p-level { opacity: 0; }

    /* chrome HUD — corner ticks + status labels */
    .p-chrome {
      position: absolute; inset: 0; z-index: 5;
      pointer-events: none; transition: opacity .42s ease;
    }
    #preloader-stage.grow .p-chrome { opacity: 0; }

        'Componiendo diseño','Montando escena','Preparando lienzo','Ajustando píxeles',

      var D = { count: 2400, hold1: 320, grow: 620, hold2: 200, part: 940, reveal: 0 };
      var easeOut  = function (t) { return 1 - Math.pow(1 - t, 3); };
      var raf, timers = [], armed = false;

      function setProgress(v) {
        outlines.forEach(function (n) { n.textContent = v; });
        levels.forEach(function (l) { l.style.height = v + '%'; });
        if (pctEl) pctEl.textContent = v;
      }

      function leave() {
        if (!armed) return; armed = false;
        window.removeEventListener('wheel',     leave);
        window.removeEventListener('touchmove', leave);
        window.removeEventListener('scroll',    leave);
        window.removeEventListener('keydown',   onKey);

      function onKey(e) {

      function arm() {
        if (armed) return; armed = true;
        window.addEventListener('wheel',     leave, { passive: true });
        window.addEventListener('touchmove', leave, { passive: true });
        window.addEventListener('scroll',    leave, { passive: true });

        stage.classList.add('ready');
        document.body.classList.remove('preloader-active');
        window.dispatchEvent(new CustomEvent('preloader:ready'));
        var heroInner = document.querySelector('.hero-inner');
        if (heroInner) heroInner.classList.add('hero-revealed');
        arm();
      }

      function run() {
        var t0 = performance.now();
        function frame(now) {
          var elapsed = now - t0;
          if (elapsed <= D.count) {
            setProgress(Math.round(easeOut(elapsed / D.count) * 100));
            raf = requestAnimationFrame(frame);
          } else {
            setProgress(100);
          }
        }
        raf = requestAnimationFrame(frame);
        var tEnd = D.count;
        timers.push(setTimeout(function () { stage.classList.add('grow'); }, tEnd + D.hold1));
        timers.push(setTimeout(function () {
          stage.classList.add('part');
          var root = document.getElementById('root');
          if (root) root.style.opacity = '1';

        timers.push(setTimeout(finish, tEnd + D.hold1 + D.grow + D.hold2 + D.part + D.reveal));

         Once the stage animation completes, fade in the number and start the counter. */

    (function () {
      if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
      var layer = document.querySelector('.cursor-hatch');
      var halo  = document.querySelector('.cursor-halo');
      var ring  = document.querySelector('.cursor-ring');
      if (!layer) return;

      var N = 9;
      var HEAD_EASE = 0.10;
      var LINK_EASE = 0.22;
      var tx = -400, ty = -400;
      var pts = [];
      for (var i = 0; i < N; i++) pts.push({ x: -400, y: -400 });

      var raf = null, hideT = null;

      function compose() {
        var pulse = 1 + 0.16 * Math.sin(Date.now() / 620);
        var aPulse = 1 + 0.22 * Math.sin(Date.now() / 620);
        var core = [], wide = [], stroke = [];
        for (var i = 0; i < N; i++) {
          var f = i / (N - 1);
          var cx = pts[i].x.toFixed(1), cy = pts[i].y.toFixed(1);

          var cr = Math.round((60 - f * 44) * pulse);
          var cA = Math.min(1, (0.98 - f * 0.84) * aPulse).toFixed(3);
          core.push('radial-gradient(' + cr + 'px circle at ' + cx + 'px ' + cy + 'px, ' +
            'rgba(0,0,0,' + cA + ') 0%, rgba(0,0,0,' + (cA * 0.6).toFixed(3) + ') 55%, transparent 80%)');

          var hr = Math.round((150 - f * 100) * pulse);
          var hA = Math.min(1, (0.62 - f * 0.54) * aPulse).toFixed(3);
          wide.push('radial-gradient(' + hr + 'px circle at ' + cx + 'px ' + cy + 'px, ' +
            'rgba(0,0,0,' + hA + ') 0%, rgba(0,0,0,' + (hA * 0.45).toFixed(3) + ') 45%, transparent 72%)');

          var rr = Math.round((150 - f * 100) * pulse);
          var rA = Math.min(1, (0.8 - f * 0.7) * aPulse).toFixed(3);
          stroke.push('radial-gradient(' + rr + 'px circle at ' + cx + 'px ' + cy + 'px, ' +
            'transparent 56%, rgba(0,0,0,' + rA + ') 74%, transparent 92%)');
        }
        var mc = core.join(', '), mh = wide.join(', '), mr = stroke.join(', ');
        layer.style.webkitMaskImage = mc; layer.style.maskImage = mc;
        halo.style.webkitMaskImage = mh;  halo.style.maskImage = mh;
        ring.style.webkitMaskImage = mr;  ring.style.maskImage = mr;
      }

      function tick() {
        pts[0].x += (tx - pts[0].x) * HEAD_EASE;
        pts[0].y += (ty - pts[0].y) * HEAD_EASE;
        for (var i = 1; i < N; i++) {
          pts[i].x += (pts[i - 1].x - pts[i].x) * LINK_EASE;
          pts[i].y += (pts[i - 1].y - pts[i].y) * LINK_EASE;
        }
        compose();

        var dx = tx - pts[N - 1].x, dy = ty - pts[N - 1].y;
        if (layer.classList.contains('on') || dx * dx + dy * dy > 0.5) { raf = requestAnimationFrame(tick); }
        else { raf = null; }
      }

      window.addEventListener('pointermove', function (e) {
        if (e.pointerType === 'touch') return;
        tx = e.clientX; ty = e.clientY;
        layer.classList.add('on'); halo.classList.add('on'); ring.classList.add('on');
        if (raf == null) raf = requestAnimationFrame(tick);
        window.clearTimeout(hideT);
        hideT = window.setTimeout(function () { layer.classList.remove('on'); halo.classList.remove('on'); ring.classList.remove('on'); }, 2600);
      }, { passive: true });
      window.addEventListener('pointerdown', function () { layer.classList.remove('on'); halo.classList.remove('on'); ring.classList.remove('on'); });
    })();

  <script>
    /* Stacking interactions:
       (1) hatch BACKGROUND PARALLAX — drift each card's diagonal weave with
           scroll so the ground keeps moving even while a card is pinned.
       (2) horizontal SLIDE — the contact slab sweeps in from the right as its
           card scrolls up into the stack. */
    (function () {
      if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
      var cards = [], slab = null, ticking = false;

      function scan() {
        cards = [].slice.call(document.querySelectorAll('.stack-card'));
        slab = document.querySelector('.contact-slab');
      }
      function apply() {
        ticking = false;
        var y = window.scrollY || window.pageYOffset || 0;
        var vh = window.innerHeight || 800;
        var drift = (y * 0.16).toFixed(1) + 'px';
        for (var i = 0; i < cards.length; i++) cards[i].style.backgroundPositionY = drift;
        if (slab) {
          slab.style.backgroundPositionY = drift;

             the form-items stagger trigger on all viewport widths */
          var card = slab.closest ? slab.closest('.stack-card') : slab.parentNode.parentNode;
          var rect = card.getBoundingClientRect();
          /* p: 0 when card top is at viewport bottom, 1 once fully pinned */
          var p = (vh - rect.top) / vh;
          p = p < 0 ? 0 : (p > 1 ? 1 : p);
          var s = (p - 0.45) / 0.55;
          s = s < 0 ? 0 : (s > 1 ? 1 : s);
          var e = 1 - Math.pow(1 - s, 3);              /* easeOutCubic */

             other card — no horizontal sweep. Clear any inline X transform. */
          if (window.innerWidth <= 768) { slab.style.transform = 'none'; }
          else if (!slab.classList.contains('items-in')) {
            /* keep the slab parked off-right while the card's surface rises into
               frame, then sweep it in horizontally over the last ~55% so the
               dominant motion reads left-from-right, not diagonal. Once locked
               in, stop updating so it never slides back on scroll-up. */
            slab.style.transform = 'translateX(' + ((1 - e) * 100).toFixed(2) + '%)';
          }

          if (e >= 0.85 && !slab.classList.contains('items-in')) {

        scan();
        new MutationObserver(scan).observe(root, { childList: true, subtree: true });
        apply();

  <script>
    /* Smooth-scroll a nav target to the scroll position where its card pins at
       the top of the viewport. Uses Lenis when present.

       For sticky stack cards, offsetTop can report 0 (the stuck visual position)
       instead of the flow position when the card is currently pinned. To stay
       correct in both directions: get .stack's absolute top via
       getBoundingClientRect + scrollY (reliable on a non-sticky element), then
       sum the offsetHeights of preceding siblings for the card's flow offset. */
    window.salGoTo = function (id) {
      var target;
      if (id === 'home' || id === 'top' || !id) {
        target = 0;
      } else {
        var el = document.querySelector('[data-nav="' + id + '"]') || document.getElementById(id);
        if (!el) return;
        var stack = typeof el.closest === 'function' ? el.closest('.stack') : null;
        if (stack) {
          var sy = window.scrollY || window.pageYOffset || 0;
          var stackAbsTop = stack.getBoundingClientRect().top + sy;
          var cardFlowTop = 0;
          var sib = stack.firstElementChild;
          while (sib && sib !== el) { cardFlowTop += sib.offsetHeight; sib = sib.nextElementSibling; }
          target = stackAbsTop + cardFlowTop;
        } else {
          var y = 0, n = el;
          while (n) { y += n.offsetTop; n = n.offsetParent; }
          target = y;
        }
      }
      if (window.__lenis && window.__lenis.scrollTo) window.__lenis.scrollTo(target, { duration: 1.05 });
      else window.scrollTo({ top: target, behavior: 'smooth' });
    };

    /* Pulse the contact card when "Get Started" is clicked while already there */
    window.salPulseContact = function () {
      var el = document.querySelector('.stack-card--contact');
      if (!el) return;
      var footer = el.querySelector('.site-footer');
      el.style.setProperty('--pulse-bottom', (footer ? footer.offsetHeight : 0) + 'px');
      el.classList.remove('contact-pulse');
      void el.offsetWidth; /* restart animation if triggered twice */
      el.classList.add('contact-pulse');
      el.addEventListener('animationend', function () { el.classList.remove('contact-pulse'); }, { once: true });
    };
  </script>

          <div className={'stack' + (stacked ? '' : ' no-stack')}>
            <div className="stack-card" data-nav="about"><About onNav={onNav} /></div>
            <div className="stack-card" data-nav="works"><Works onNav={onNav} /></div>
            <div className="stack-card stack-card--contact" data-nav="contact">
              <Marquee />
              <div className="contact-body">
                <ContactSide />
                <div className="contact-slab">
                  <Contact onNav={onNav} />
                </div>
              </div>
              <Footer />
            </div>
          </div>
          <Toast msg={toast} />
          <TweaksPanel title="Tweaks">
            <TweakSection label="Scroll" />
            <TweakRadio label="Stacking" value={stacked ? 'on' : 'off'}
              options={[{ value: 'on', label: 'Stacked' }, { value: 'off', label: 'Linear' }]}
              onChange={(v) => setTweak('stacking', v)} />
            <TweakSection label="Appearance" />
            <TweakRadio label="Theme" value={theme}
              options={[{ value: 'dark', label: 'Dark' }, { value: 'light', label: 'Light' }]}
              onChange={setTheme} />
          </TweaksPanel>
        </window.LangCtx.Provider>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
